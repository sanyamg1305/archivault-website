<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0B1220;--ink2:#1E2D45;--muted:#6B7A96;--dim:#D8DEE9;--bg:#FAFAF8;--white:#FFFFFF;--blue:#1B4FD8;--blue-d:#1340B0;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.num{font-family:var(--serif);font-size:clamp(80px,15vw,140px);line-height:1;color:var(--dim);margin-bottom:8px}
.title{font-family:var(--serif);font-size:clamp(24px,4vw,36px);color:var(--ink);margin-bottom:12px}
.sub{font-size:16px;color:var(--muted);font-weight:300;max-width:400px;line-height:1.6;margin-bottom:40px}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-home{padding:12px 28px;background:var(--blue);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;transition:background 0.15s}
.btn-home:hover{background:var(--blue-d)}
.btn-ghost{padding:12px 28px;border:1px solid var(--dim);color:var(--ink2);border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;transition:border-color 0.15s,color 0.15s}
.btn-ghost:hover{border-color:#b0bcd4;color:var(--blue)}
.logo{font-family:var(--serif);font-size:18px;color:var(--ink);text-decoration:none;position:fixed;top:24px;left:32px}
.logo span{color:var(--blue)}
@media(max-width:480px){.links{flex-direction:column;width:100%}.btn-home,.btn-ghost{width:100%;text-align:center}}
</style>
</head>
<body>
<a href="/" class="logo">Archi<span>vault</span></a>

</div>
</body>
